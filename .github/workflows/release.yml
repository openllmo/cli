name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Confirm package version matches the pushed tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi
      - name: npm publish (Trusted Publishing + provenance)
        # Trusted Publishing requires npm CLI v11.5.1+. The runner's bundled
        # npm with Node 22 is 10.9.7. Self-upgrading via `npm install -g
        # npm@latest` hits the well-known npm self-upgrade race (npm 10.x
        # removes its own modules mid-install and can't reload them). Bypass
        # by running publish through a transient npm@latest via npx, leaving
        # the system npm untouched.
        run: |
          echo "system npm: $(npm --version)"
          npx --package=npm@latest --yes -- npm --version
          npx --package=npm@latest --yes -- npm publish --access public --provenance
