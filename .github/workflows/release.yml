name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Confirm package version matches the pushed tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi
      - name: Upgrade npm for Trusted Publishing support (requires v11.5.1+)
        run: npm install -g npm@latest
      - name: npm publish (Trusted Publishing + provenance)
        run: |
          npm --version
          npm publish --access public --provenance
